# YUA-LLM S3: 6.7B parameters
model:
  name: yua1.0-6.7b
  n_layers: 32
  d_model: 4096
  n_heads: 32
  head_dim: 128
  ffn_dim: 16384
  vocab_size: 250000
  context_length: 2048
  dropout: 0.0
  bias: false
  norm: rmsnorm
  position_encoding: alibi
  activation: gelu
  tie_embeddings: false
  gqa_groups: 8  # GQA: 32 heads -> 8 KV heads

training:
  batch_tokens: 2_000_000
  max_tokens: 134_000_000_000  # ~Chinchilla optimal
  lr: 1.2e-4
  lr_min_ratio: 0.1
  warmup_tokens: 375_000_000
  weight_decay: 0.1
  grad_clip: 1.0
  precision: bf16
