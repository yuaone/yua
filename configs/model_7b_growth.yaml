# YUA Growth Family S3: ~7B Dense (DEPRECATED — use model_moe_9b.yaml instead)
# NOTE: Width expansion (checkpoint transfer) proven impossible (EXP-001).
# This config is kept for reference only. Actual 7B uses MoE architecture.
model:
  name: yua-growth-7b
  n_layers: 32
  d_model: 4096
  n_heads: 64
  head_dim: 64
  ffn_dim: 10922             # SwiGLU: 16384 * 2/3 ≈ 10922
  vocab_size: 128000
  context_length: 2048
  dropout: 0.0
  bias: false
  norm: rmsnorm
  position_encoding: rope
  rope_theta: 500000
  activation: swiglu
  tie_embeddings: true
  embed_scaling: false
  gqa_groups: 16             # Scales 1.3B's 8 KV heads proportionally
  qk_norm: true
  attn_res: block
  attn_res_block_size: 4
  mtp_num_heads: 2
  mtp_loss_weight: 0.1

training:
  batch_tokens: 4_000_000
  max_tokens: 134_000_000_000
  lr: 1.2e-4
  lr_min_ratio: 0.1
  warmup_tokens: 375_000_000
  weight_decay: 0.1
  grad_clip: 1.0
  precision: bf16
