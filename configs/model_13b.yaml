# YUA-LLM S4: 13B parameters
model:
  name: yua1.0-13b
  n_layers: 40
  d_model: 5140
  n_heads: 40
  head_dim: 128
  ffn_dim: 20560
  vocab_size: 250000
  context_length: 2048
  dropout: 0.0
  bias: false
  norm: rmsnorm
  position_encoding: alibi
  activation: gelu
  tie_embeddings: false
  gqa_groups: 8

training:
  batch_tokens: 2_000_000
  max_tokens: 260_000_000_000  # ~Chinchilla optimal
  lr: 1.0e-4
  lr_min_ratio: 0.1
  warmup_tokens: 375_000_000
  weight_decay: 0.1
  grad_clip: 1.0
  precision: bf16
